<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b67b13"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0c04"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#bg)" stroke="url(#g)" stroke-width="1.5"/>
  <!-- Shield shape -->
  <path d="M32 8 L48 16 L48 36 Q48 50 32 56 Q16 50 16 36 L16 16 Z" 
        fill="none" stroke="url(#g)" stroke-width="2" filter="url(#glow)"/>
  <!-- Fist/C in center -->
  <text x="32" y="42" font-family="serif" font-size="28" font-weight="900" 
        fill="url(#g)" text-anchor="middle" filter="url(#glow)">C</text>
  <!-- Star accent -->
  <polygon points="32,10 34,16 40,16 35,20 37,26 32,22 27,26 29,20 24,16 30,16" 
           fill="url(#g)" opacity="0.6"/>
</svg>
