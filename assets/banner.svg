<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0603"/>
      <stop offset="50%" stop-color="#1a0c04"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="30%" stop-color="#f0c040"/>
      <stop offset="70%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#b67b13"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff2ac"/>
      <stop offset="100%" stop-color="#b67b13"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="#ffd700"/>
      <stop offset="80%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="rgba(255,215,0,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="70%" r="40%">
      <stop offset="0%" stop-color="rgba(255,215,0,0.05)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="titleGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="noise" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="200" height="200" fill="none"/>
      <path d="M0 0h200v200H0z" fill="rgba(0,0,0,0.03)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg1)"/>
  <rect width="1200" height="400" fill="url(#noise)"/>
  
  <!-- Radial glows -->
  <rect width="1200" height="400" fill="url(#glow1)"/>
  <rect width="1200" height="400" fill="url(#glow2)"/>

  <!-- Top gold line -->
  <rect x="200" y="20" width="800" height="1" fill="url(#line)" opacity="0.6"/>

  <!-- Decorative corner elements -->
  <path d="M30 30 L80 30 M30 30 L30 80" stroke="#ffd700" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M1170 30 L1120 30 M1170 30 L1170 80" stroke="#ffd700" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M30 370 L80 370 M30 370 L30 320" stroke="#ffd700" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M1170 370 L1120 370 M1170 370 L1170 320" stroke="#ffd700" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Shield emblem -->
  <g transform="translate(600, 120)" opacity="0.08">
    <path d="M0 -60 L50 -30 L50 30 Q50 70 0 90 Q-50 70 -50 30 L-50 -30 Z" 
          fill="#ffd700" stroke="none"/>
  </g>

  <!-- Main Title -->
  <text x="600" y="165" font-family="Georgia, 'Times New Roman', serif" 
        font-size="76" font-weight="900" fill="url(#gold)" 
        text-anchor="middle" letter-spacing="8" filter="url(#titleGlow)">
    CHUG
  </text>

  <!-- Shadow of Fame subtitle -->
  <text x="600" y="220" font-family="Georgia, 'Times New Roman', serif" 
        font-size="28" fill="#c9b497" 
        text-anchor="middle" letter-spacing="18" opacity="0.85">
    SHADOW OF FAME
  </text>

  <!-- Divider stars -->
  <text x="600" y="255" font-size="14" fill="#ffd700" text-anchor="middle" 
        letter-spacing="12" opacity="0.5">✦ ✦ ✦</text>

  <!-- Tagline -->
  <text x="600" y="295" font-family="Georgia, serif" font-size="15" 
        fill="rgba(255,215,0,0.35)" text-anchor="middle" 
        letter-spacing="6" font-style="italic">
    A Cinematic Browser Fighting RPG
  </text>

  <!-- Made by Xollonox -->
  <text x="600" y="340" font-family="'Trebuchet MS', sans-serif" 
        font-size="11" fill="rgba(255,215,0,0.25)" 
        text-anchor="middle" letter-spacing="10" text-transform="uppercase">
    MADE BY XOLLONOX
  </text>

  <!-- Bottom gold line -->
  <rect x="200" y="375" width="800" height="1" fill="url(#line)" opacity="0.4"/>
</svg>
